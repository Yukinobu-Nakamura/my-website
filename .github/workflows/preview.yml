name: Deploy Preview

on:
  push:
    branches:
      - claude/add-navigation-menu-Y83Mr

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Encrypt HTML files
        run: |
          mkdir -p docs
          cp style.css script.js docs/
          staticrypt index.html 404.html \
            -p "cpaataru10969" \
            -d docs \
            --short \
            -s "fec4cca279d37c0150677641ab98813b"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
