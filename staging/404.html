<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - ページが見つかりません | Yukinobu Nakamura</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    body { background: var(--gradient-hero); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 1.5rem; }
    .err-code { font-size: 8rem; font-weight: 900; background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    .err-msg  { font-size: 1.2rem; color: rgba(255,255,255,.7); font-family: var(--font-jp); }
  </style>
</head>
<body>
  <p class="err-code">404</p>
  <h1 class="err-msg">ページが見つかりません</h1>
  <a href="/" class="btn btn--primary">トップへ戻る</a>
</body>
</html>
